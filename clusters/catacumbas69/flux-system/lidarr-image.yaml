---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: lidarr
  namespace: flux-system
spec:
  image: lscr.io/linuxserver/lidarr
  interval: 1m

---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: lidarr
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: lidarr
  filterTags:
    pattern: '^[\d]+\.[\d]+\.[\d]+\.[\d]+-ls[\d]+$'
    extract: '$0'
  policy:
    alphabetical:
      order: asc
#  policy:
#    semver:
#      range: '>=0.0.0'
