---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: slskd
  namespace: flux-system
spec:
  image: slskd/slskd
  interval: 1m

---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: slskd
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: slskd
  policy:
    semver:
      range: '>=0.0.0'
