---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: jackett
  namespace: flux-system
spec:
  image: lscr.io/linuxserver/jackett
  interval: 1m

---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: jackett
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: jackett
  policy:
    semver:
      range: '>=0.0.0'
