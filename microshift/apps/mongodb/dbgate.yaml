apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbgate
  namespace: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dbgate
  template:
    metadata:
      labels:
        app: dbgate
    spec:
      containers:
        - name: dbgate
          image: docker.io/dbgate/dbgate:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              # Corrigir o entrypoint para não falhar com a política de segurança do OpenShift
              sed -i 's/echo.*etc\/hosts//g' /home/dbgate-docker/entrypoint.sh 2>/dev/null || true
              sed -i 's/.*hosts.*/# hosts alterado/g' /home/dbgate-docker/entrypoint.sh

              # Forçar a pré-instalação do plugin do MongoDB antes do binário principal iniciar
              echo "=== [PRE-START] A tentar instalar o plugin mongodb... ==="
              mkdir -p /tmp/.dbgate/plugins
              cd /tmp/.dbgate/plugins
              if npm install dbgate-plugin-mongodb --no-audit --no-fund --quiet; then
                mv node_modules/dbgate-plugin-mongodb ./dbgate-plugin-mongodb 2>/dev/null || true
                echo "=== [PRE-START] Plugin instalado com sucesso! ==="
              else
                echo "=== [PRE-START] AVISO: npm install falhou. O pod poderá estar sem acesso à Internet/DNS. ==="
              fi

              exec /home/dbgate-docker/entrypoint.sh
          ports:
            - containerPort: 3000
          env:
            # Forçar caminhos globais no /tmp para garantir que qualquer processo do npm tem escrita
            - name: HOME
              value: "/tmp"
            - name: NPM_CONFIG_CACHE
              value: "/tmp/.npm"
            - name: HOST
              value: "0.0.0.0"
            # Configuração da tua base de dados
            - name: CONNECTIONS
              value: "catacumbas69_db"
            - name: LABEL_catacumbas69_db
              value: "Catacumbas69"
            - name: ENGINE_catacumbas69_db
              value: "mongodb"
            - name: URL_catacumbas69_db
              value: "mongodb://peewee69:Pass123-456-789@catacumbas69-svc.mongodb.svc.cluster.local:27017/admin?replicaSet=catacumbas69"
          volumeMounts:
            - name: dbgate-storage
              mountPath: /tmp/.dbgate
      volumes:
        - name: dbgate-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: dbgate
  namespace: mongodb
spec:
  ports:
    - name: http
      port: 80
      targetPort: 3000
  selector:
    app: dbgate
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: dbgate-web
  namespace: mongodb
spec:
  host: dbgate.catacumbas69.com
  to:
    kind: Service
    name: dbgate
    weight: 100
  port:
    targetPort: http