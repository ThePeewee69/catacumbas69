apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbgate
  namespace: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dbgate
  template:
    metadata:
      labels:
        app: dbgate
    spec:
      containers:
        - name: dbgate
          image: docker.io/dbgate/dbgate:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              # Contornar restrições de escrita no /etc/hosts impostas pelo OpenShift
              sed -i 's/echo.*etc\/hosts//g' /home/dbgate-docker/entrypoint.sh 2>/dev/null || true
              sed -i 's/.*hosts.*/# hosts alterado/g' /home/dbgate-docker/entrypoint.sh

              echo "=== [PRE-START] A preparar diretório de plugins ==="
              mkdir -p /tmp/.dbgate/plugins
              cd /tmp/.dbgate/plugins

              echo "=== [PRE-START] A tentar instalar o driver nativo do MongoDB... ==="
              if npm install dbgate-plugin-mongodb --no-audit --no-fund --quiet; then
                if [ -d "node_modules/dbgate-plugin-mongodb" ]; then
                  mv node_modules/dbgate-plugin-mongodb ./dbgate-plugin-mongodb
                  rm -rf node_modules package-lock.json
                  echo "=== [PRE-START] Plugin do MongoDB instalado com sucesso! ==="
                fi
              else
                echo "=== [PRE-START] AVISO CRÍTICO: npm install falhou! ==="
                echo "Isto acontece se o pod não tiver rota para a Internet ou o DNS do MicroShift estiver isolado."
              fi

              # Voltar à raiz da aplicação e arrancar o DbGate
              cd /home/dbgate-docker
              echo "=== [PRE-START] A iniciar a API do DbGate... ==="
              exec /home/dbgate-docker/entrypoint.sh
          ports:
            - containerPort: 3000
          env:
            - name: HOME
              value: "/tmp"
            - name: NPM_CONFIG_CACHE
              value: "/tmp/.npm"
            - name: CONNECTIONS_DIR
              value: "/tmp/.dbgate"
            - name: HOST
              value: "0.0.0.0"
            - name: CONNECTIONS
              value: "catacumbas69_db"
            - name: LABEL_catacumbas69_db
              value: "Catacumbas69"
            - name: ENGINE_catacumbas69_db
              value: "mongodb"
            - name: URL_catacumbas69_db
              value: "mongodb://peewee69:Pass123-456-789@catacumbas69-svc.mongodb.svc.cluster.local:27017/admin?replicaSet=catacumbas69"
          volumeMounts:
            - name: tmp-scratch
              mountPath: /tmp
      volumes:
        - name: tmp-scratch
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: dbgate
  namespace: mongodb
spec:
  ports:
    - name: http
      port: 80
      targetPort: 3000
  selector:
    app: dbgate
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: dbgate-web
  namespace: mongodb
spec:
  host: dbgate.catacumbas69.com
  to:
    kind: Service
    name: dbgate
    weight: 100
  port:
    targetPort: http