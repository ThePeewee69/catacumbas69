apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbgate
  namespace: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dbgate
  template:
    metadata:
      labels:
        app: dbgate
    spec:
      initContainers:
        - name: populate-plugins
          image: docker.io/dbgate/dbgate:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "=== [INIT] A preparar a diretoria de plugins em /tmp... ==="
              mkdir -p /mnt/.dbgate/plugins
              if [ -d "/home/dbgate-docker/plugins" ]; then
                cp -r /home/dbgate-docker/plugins/. /mnt/.dbgate/plugins/
                echo "=== [INIT] Plugins nativos copiados com sucesso! ==="
                ls -la /mnt/.dbgate/plugins/
              else
                echo "=== [INIT] ERRO: Pasta de origem nao encontrada ==="
                exit 1
              fi
          volumeMounts:
            - name: dbgate-storage
              mountPath: /mnt
      containers:
        - name: dbgate
          image: docker.io/dbgate/dbgate:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: HOME
              value: "/tmp"
            - name: HOST
              value: "0.0.0.0"
            - name: CONNECTIONS
              value: "catacumbas69_db"
            - name: LABEL_catacumbas69_db
              value: "Catacumbas69"
            - name: ENGINE_catacumbas69_db
              value: "mongodb"
            - name: URL_catacumbas69_db
              value: "mongodb://peewee69:Pass123-456-789@catacumbas69-svc.mongodb.svc.cluster.local:27017/admin?replicaSet=catacumbas69"
          volumeMounts:
            - name: dbgate-storage
              mountPath: /tmp
      volumes:
        - name: dbgate-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: dbgate
  namespace: mongodb
spec:
  ports:
    - name: http
      port: 80
      targetPort: 3000
  selector:
    app: dbgate
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: dbgate-web
  namespace: mongodb
spec:
  host: dbgate.catacumbas69.com
  to:
    kind: Service
    name: dbgate
    weight: 100
  port:
    targetPort: http