apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbgate
  namespace: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dbgate
  template:
    metadata:
      labels:
        app: dbgate
    spec:
      containers:
        - name: dbgate
          image: docker.io/dbgate/dbgate:latest
          # Forçar o DbGate a correr no contexto non-root seguro do OpenShift
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 3000
          env:
            # Enviar todas as configurações internas para o /tmp para evitar EACCES
            - name: CONNECTIONS_DIR
              value: "/tmp/dbgate-connections"
            - name: PLUGINS_DIR
              value: "/tmp/dbgate-plugins"
            # Configuração da Base de Dados
            - name: CONNECTIONS
              value: "catacumbas69_db"
            - name: LABEL_catacumbas69_db
              value: "Catacumbas 69"
            - name: ENGINE_catacumbas69_db
              value: "mongo"
            - name: URL_catacumbas69_db
              value: "mongodb://peewee69:Pass123-456-789@catacumbas69-svc.mongodb.svc.cluster.local:27017/admin?replicaSet=catacumbas69"
---
apiVersion: v1
kind: Service
metadata:
  name: dbgate
  namespace: mongodb
spec:
  ports:
    - port: 80
      targetPort: 3000
  selector:
    app: dbgate
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: dbgate-web
  namespace: mongodb
spec:
  host: dbgate.catacumbas69.com
  to:
    kind: Service
    name: dbgate
    weight: 100
  port:
    targetPort: 80