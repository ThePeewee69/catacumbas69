apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbgate
  namespace: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dbgate
  template:
    metadata:
      labels:
        app: dbgate
    spec:
      initContainers:
        - name: populate-plugins
          image: docker.io/dbgate/dbgate:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "=== [INIT] A iniciar varrimento dinâmico de plugins... ==="
              TARGET_DIR="/mnt/.dbgate/plugins"
              mkdir -p "$TARGET_DIR"

              # Caça o diretório do plugin do mongo em qualquer lado da imagem
              FOUND_PATH=$(find / -type d -name "dbgate-plugin-mongodb" 2>/dev/null | head -n 1)

              if [ -n "$FOUND_PATH" ]; then
                # Obtém o diretório pai que aloja todos os plugins nativos
                SRC_DIR=$(dirname "$FOUND_PATH")
                echo "=== [INIT] Sucesso! Plugins detetados em: $SRC_DIR ==="
                cp -r "$SRC_DIR"/. "$TARGET_DIR"/
                echo "=== [INIT] Plugins transferidos com sucesso para o volume. ==="
                ls -la "$TARGET_DIR"
              else
                echo "=== [INIT] ERRO: Não foi possível localizar 'dbgate-plugin-mongodb' ==="
                echo "=== Rastreio do diretório da aplicação: ==="
                ls -la /home/dbgate-docker 2>/dev/null
              fi
          volumeMounts:
            - name: dbgate-storage
              mountPath: /mnt
      containers:
        - name: dbgate
          image: docker.io/dbgate/dbgate:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: HOME
              value: "/tmp"
            - name: HOST
              value: "0.0.0.0"
            - name: CONNECTIONS
              value: "catacumbas69_db"
            - name: LABEL_catacumbas69_db
              value: "Catacumbas 69"
            - name: ENGINE_catacumbas69_db
              value: "mongodb"
            - name: URL_catacumbas69_db
              value: "mongodb://peewee69:Pass123-456-789@catacumbas69-svc.mongodb.svc.cluster.local:27017/admin?replicaSet=catacumbas69"
          volumeMounts:
            - name: dbgate-storage
              mountPath: /tmp
      volumes:
        - name: dbgate-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: dbgate
  namespace: mongodb
spec:
  ports:
    - name: http
      port: 80
      targetPort: 3000
  selector:
    app: dbgate
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: dbgate-web
  namespace: mongodb
spec:
  host: dbgate.catacumbas69.com
  to:
    kind: Service
    name: dbgate
    weight: 100
  port:
    targetPort: http