apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbgate
  namespace: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dbgate
  template:
    metadata:
      labels:
        app: dbgate
    spec:
      containers:
        - name: dbgate
          image: docker.io/dbgate/dbgate:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              export HOME=/tmp
              sed -i 's/echo.*etc\/hosts//g' /home/dbgate-docker/entrypoint.sh 2>/dev/null || true
              sed -i 's/.*hosts.*/# hosts alterado/g' /home/dbgate-docker/entrypoint.sh
              export HOST=0.0.0.0
              exec /home/dbgate-docker/entrypoint.sh
          ports:
            - containerPort: 3000
          env:
            - name: CONNECTIONS
              value: "catacumbas69_db"
            - name: LABEL_catacumbas69_db
              value: "Catacumbas 69"
            - name: ENGINE_catacumbas69_db
              value: "mongo"
            - name: URL_catacumbas69_db
              value: "mongodb://peewee69:Pass123-456-789@catacumbas69-svc.mongodb.svc.cluster.local:27017/admin?replicaSet=catacumbas69"
          volumeMounts:
            - name: dbgate-storage
              mountPath: /.dbgate
      volumes:
        - name: dbgate-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: dbgate
  namespace: mongodb
spec:
  type: NodePort          # <--- Muda para NodePort para expor direto na máquina
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 32080     # <--- Porto físico que vai ficar aberto no teu meloes
  selector:
    app: dbgate