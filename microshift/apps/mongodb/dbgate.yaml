apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbgate
  namespace: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dbgate
  template:
    metadata:
      labels:
        app: dbgate
    spec:
      containers:
        - name: dbgate
          image: docker.io/dbgate/dbgate:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              # 1. Corrigir o entrypoint original para contornar restrições do OpenShift
              sed -i 's/echo.*etc\/hosts//g' /home/dbgate-docker/entrypoint.sh 2>/dev/null || true
              sed -i 's/.*hosts.*/# hosts alterado/g' /home/dbgate-docker/entrypoint.sh

              # 2. DESCOBERTA DINÂMICA: Localizar onde os plugins estão realmente guardados
              echo "=== [PRE-START] A varrer o sistema à procura dos plugins nativos... ==="
              REAL_PLUGINS_DIR=""

              if [ -d "/home/dbgate-docker/.dbgate/plugins/dbgate-plugin-mongodb" ]; then
                REAL_PLUGINS_DIR="/home/dbgate-docker/.dbgate/plugins"
              elif [ -d "/home/dbgate-docker/plugins/dbgate-plugin-mongodb" ]; then
                REAL_PLUGINS_DIR="/home/dbgate-docker/plugins"
              else
                # Procura profunda caso a imagem tenha mudado a estrutura interna
                FOUND=$(find /home/dbgate-docker -type d -name "dbgate-plugin-mongodb" 2>/dev/null | head -n 1)
                if [ -n "$FOUND" ]; then
                  REAL_PLUGINS_DIR=$(dirname "$FOUND")
                fi
              fi

              # 3. Forçar o DbGate a ler os plugins diretamente do sítio certo
              if [ -n "$REAL_PLUGINS_DIR" ]; then
                echo "=== [PRE-START] Sucesso! Plugins detetados em: $REAL_PLUGINS_DIR ==="
                export PLUGINS_DIR="$REAL_PLUGINS_DIR"
              else
                echo "=== [PRE-START] AVISO: Não encontrei o driver nas pastas padrão. ==="
                echo "=== Estrutura atual de /home/dbgate-docker: ==="
                ls -la /home/dbgate-docker 2>/dev/null
              fi

              # 4. Voltar ao diretório da aplicação e arrancar o processo principal
              cd /home/dbgate-docker
              echo "=== [PRE-START] A lançar o servidor DbGate... ==="
              exec /home/dbgate-docker/entrypoint.sh
          ports:
            - containerPort: 3000
          env:
            - name: HOME
              value: "/tmp"
            - name: DATA_DIR
              value: "/tmp/.dbgate"
            - name: HOST
              value: "0.0.0.0"
            - name: CONNECTIONS
              value: "catacumbas69_db"
            - name: LABEL_catacumbas69_db
              value: "Catacumbas 69"
            - name: ENGINE_catacumbas69_db
              value: "mongodb"
            - name: URL_catacumbas69_db
              value: "mongodb://peewee69:Pass123-456-789@catacumbas69-svc.mongodb.svc.cluster.local:27017/admin?replicaSet=catacumbas69"
          volumeMounts:
            - name: dbgate-storage
              mountPath: /tmp/.dbgate
      volumes:
        - name: dbgate-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: dbgate
  namespace: mongodb
spec:
  ports:
    - name: http
      port: 80
      targetPort: 3000
  selector:
    app: dbgate
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: dbgate-web
  namespace: mongodb
spec:
  host: dbgate.catacumbas69.com
  to:
    kind: Service
    name: dbgate
    weight: 100
  port:
    targetPort: http