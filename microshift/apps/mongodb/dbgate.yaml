apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbgate
  namespace: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dbgate
  template:
    metadata:
      labels:
        app: dbgate
    spec:
      containers:
        - name: dbgate
          image: docker.io/dbgate/dbgate:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              export HOME=/tmp
              echo "A remover a alteração abusiva ao /etc/hosts..."
              # Apaga a linha 8 do script entrypoint que causava o Permission Denied
              sed -i 's/echo.*etc\/hosts//g' /home/dbgate-docker/entrypoint.sh 2>/dev/null || true
              sed -i 's/.*hosts.*/# hosts alterado/g' /home/dbgate-docker/entrypoint.sh
              
              echo "A iniciar o DbGate através do entrypoint oficial..."
              exec /home/dbgate-docker/entrypoint.sh
          ports:
            - containerPort: 3000
          env:
            - name: CONNECTIONS
              value: "catacumbas69_db"
            - name: LABEL_catacumbas69_db
              value: "Catacumbas 69"
            - name: ENGINE_catacumbas69_db
              value: "mongo"
            - name: URL_catacumbas69_db
              value: "mongodb://peewee69:Pass123-456-789@catacumbas69-svc.mongodb.svc.cluster.local:27017/admin?replicaSet=catacumbas69"
          volumeMounts:
            - name: dbgate-storage
              mountPath: /.dbgate
      volumes:
        - name: dbgate-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: dbgate
  namespace: mongodb
spec:
  ports:
    - port: 80
      targetPort: 3000
  selector:
    app: dbgate
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: dbgate-web
  namespace: mongodb
spec:
  host: dbgate.catacumbas69.com
  to:
    kind: Service
    name: dbgate
    weight: 100
  port:
    targetPort: 80