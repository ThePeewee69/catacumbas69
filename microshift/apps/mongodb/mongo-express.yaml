apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-express
  namespace: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-express
  template:
    metadata:
      labels:
        app: mongo-express
    spec:
      containers:
        - name: mongo-express
          image: docker.io/library/mongo-express:1.0.0-alpha.4
          ports:
            - containerPort: 8081
          env:
            # Liga ao teu StateFulSet 'catacumbas69' usando o formato de connection string do Mongo
            - name: ME_CONFIG_MONGODB_URL
              value: "mongodb://peewee69:Pass123-456-789@catacumbas69-0.catacumbas69.mongodb.svc.cluster.local:27017,catacumbas69-1.catacumbas69.mongodb.svc.cluster.local:27017,
              catacumbas69-2.catacumbas69.mongodb.svc.cluster.local:27017/?replicaSet=catacumbas69&authSource=admin"
            # Credenciais para acederes à página web do Mongo Express
            - name: ME_CONFIG_BASICAUTH_USERNAME
              value: "peewee69"
            - name: ME_CONFIG_BASICAUTH_PASSWORD
              value: "Pass123-456-789"
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-express
  namespace: mongodb
spec:
  ports:
    - port: 8081
      targetPort: 8081
  selector:
    app: mongo-express