apiVersion: apps/v1
kind: Deployment
metadata:
  name: prisma-studio
  namespace: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prisma-studio
  template:
    metadata:
      labels:
        app: prisma-studio
    spec:
      containers:
        - name: prisma-studio
          image: docker.io/library/node:22-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              export HOME=/tmp
              export NPM_CONFIG_PREFIX=/tmp/npm-global
              export PATH=$PATH:/tmp/npm-global/bin
              export npm_config_cache=/tmp/npm-cache
              
              mkdir -p /tmp/app && cd /tmp/app
              
              # 1. Criar o package.json para ativar EcmaScript Modules (ESM)
              cat << 'EOF' > package.json
              {
                "type": "module",
                "dependencies": {
                  "@prisma/client": "latest",
                  "prisma": "latest"
                }
              }
              EOF
              
              # 2. Criar o novo ficheiro de configuração exigido pelo Prisma 7
              cat << 'EOF' > prisma.config.js
              import { defineConfig } from 'prisma/config';

              export default defineConfig({
                earlyAccess: true,
                datasource: {
                  provider: 'mongodb',
                  url: process.env.DATABASE_URL
                }
              });
              EOF
              
              # 3. O schema.prisma agora só precisa de declarar o generator
              cat << 'EOF' > schema.prisma
              generator client {
                provider = "prisma-client-js"
              }
              EOF
              
              echo "A instalar a versão MAIS RECENTE do Prisma (v7.x)..."
              npm install
              
              echo "A gerar o Client com as novas especificações da v7..."
              npx prisma generate
              
              echo "A lançar o Prisma Studio v7 na porta 5555..."
              npx prisma studio --port 5555 --browser none
          ports:
            - containerPort: 5555
          env:
            - name: DATABASE_URL
              value: "mongodb://peewee69:Pass123-456-789@catacumbas69-svc.mongodb.svc.cluster.local:27017/admin?replicaSet=catacumbas69"
---
apiVersion: v1
kind: Service
metadata:
  name: prisma-studio
  namespace: mongodb
spec:
  ports:
    - port: 5555
      targetPort: 5555
  selector:
    app: prisma-studio
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: prisma-studio-web
  namespace: mongodb
spec:
  host: studio.catacumbas69.com
  to:
    kind: Service
    name: prisma-studio
    weight: 100
  port:
    targetPort: 5555