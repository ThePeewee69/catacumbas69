apiVersion: apps/v1
kind: Deployment
metadata:
  name: prisma-studio
  namespace: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prisma-studio
  template:
    metadata:
      labels:
        app: prisma-studio
    spec:
      containers:
        - name: prisma-studio
          image: docker.io/library/node:22-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              # Forçar o HOME a ser o /tmp para desviar todas as criações de lixo/cache da raiz
              export HOME=/tmp
              export NPM_CONFIG_PREFIX=/tmp/npm-global
              export PATH=$PATH:/tmp/npm-global/bin
              export npm_config_cache=/tmp/npm-cache
              
              mkdir -p /tmp/app && cd /tmp/app
              
              cat << 'EOF' > schema.prisma
              datasource db {
                provider = "mongodb"
                url      = env("DATABASE_URL")
              }
              generator client {
                provider = "prisma-client-js"
              }
              EOF
              
              # libc6-compat e openssl já não são estritamente necessários porque o prisma-client saca os binários locais no npm install
              echo "A instalar o Prisma CLI e Client localmente..."
              npm install prisma @prisma/client
              
              echo "A inicializar o Prisma Studio na porta 5555..."
              npx prisma studio --port 5555 --browser none
          ports:
            - containerPort: 5555
          env:
            - name: DATABASE_URL
              value: "mongodb://peewee69:Pass123-456-789@catacumbas69-svc.mongodb.svc.cluster.local:27017/admin?replicaSet=catacumbas69"
---
apiVersion: v1
kind: Service
metadata:
  name: prisma-studio
  namespace: mongodb
spec:
  ports:
    - port: 5555
      targetPort: 5555
  selector:
    app: prisma-studio
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: prisma-studio-web
  namespace: mongodb
spec:
  host: studio.catacumbas69.com
  to:
    kind: Service
    name: prisma-studio
    weight: 100
  port:
    targetPort: 5555