---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: grafana-pv
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: 192.168.86.50
    path: /volume1/k3s/monitoring/Grafana
  mountOptions:
    - nfsvers=4.0
    - noatime
    - lookupcache=all
    - timeo=600
    - retrans=2
    - hard

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: monitoring
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  volumeName: grafana-pv
  storageClassName: ""
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi

