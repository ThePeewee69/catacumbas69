deploymentMode: SingleBinary

singleBinary:
  replicas: 1

# Desativar qualquer target escalável
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0
gateway:
  enabled: true

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  storage:
    type: filesystem

  limits_config:
    retention_period: 720h  # 30 dias

persistence:
  enabled: true
  storageClassName: longhorn
  size: 100Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi
