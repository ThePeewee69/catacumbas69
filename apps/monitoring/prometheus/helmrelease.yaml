apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "82.12.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
  values:
    prometheus:
      prometheusSpec:
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: ""
              volumeName: prometheus-pv
              accessModes:
                - ReadWriteMany
              resources:
                requests:
                  storage: 10Gi
    nodeExporter:
      enabled: true
      service:
        port: 19100
    kubeStateMetrics:
      enabled: true
    grafana:
      adminPassword: Pass123-456-789
      enabled: true
      grafana.ini:
        server:
          domain: grafana.catacumbas69.com
          root_url: http://grafana.catacumbas69.com:8080
          serve_from_sub_path: false
          enable_gzip: true
          router_logging: true
          enforce_domain: false
        security:
          allow_embedding: true
        auth.anonymous:
          enabled: true
          org_role: Viewer
      ingress:
        enabled: false
      service:
        type: ClusterIP
      persistence:
        enabled: true
        storageClassName: ""
        existingClaim: grafana-pvc
