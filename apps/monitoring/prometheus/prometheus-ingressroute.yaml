apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus
  namespace: monitoring
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`prometheus.catacumbas69.com`)
      kind: Rule
      priority: 100
      services:
        - name: prometheus-kube-prometheus-prometheus
          port: 9090
