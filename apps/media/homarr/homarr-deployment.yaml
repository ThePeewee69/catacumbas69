apiVersion: apps/v1
kind: Deployment
metadata:
  name: homarr
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homarr
  template:
    metadata:
      labels:
        app: homarr
    spec:
      containers:
        - name: homarr
          image: ghcr.io/ajnart/homarr:0.16.1 # {"$imagepolicy": "flux-system:homarr"}
          ports:
            - containerPort: 7575
          env:
            - name: NEXTAUTH_URL
              value: "http://homarr.catacumbas69.com:8080"
            - name: PUBLIC_URL
              value: "http://homarr.catacumbas69.com:8080"
            - name: NEXTAUTH_SECRET
              value: "YPCNoNRJ0rb/Ylho6jGxK8CZZ807Yyzly+iJVa2j1ak="
          volumeMounts:
            - name: config
              mountPath: /data
            - name: icons
              mountPath: /app/public/icons
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: homarr-config
        - name: icons
          emptyDir: {}
