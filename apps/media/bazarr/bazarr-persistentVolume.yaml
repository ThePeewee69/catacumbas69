apiVersion: v1
kind: PersistentVolume
metadata:
  name: bazarr-pv
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: 192.168.86.50
    path: /volume1/k3s/media/Bazarr
  mountOptions:
    - nfsvers=4.0
    - noatime
    - lookupcache=all
    - timeo=600
    - retrans=2
    - hard
